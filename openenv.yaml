name: sql-query-optimizer
version: "1.0.0"
description: >
  An RL environment where AI agents learn to rewrite slow SQL queries into
  efficient, production-grade ones.
domain: database-engineering
tags:
  - sql
  - query-optimization
  - database
  - real-world
  - openenv
server: "server:main"
tasks:
  - id: select_star_cleanup
    difficulty: easy
    description: "Remove SELECT *, unnecessary DISTINCT, add column specificity and is_active filter"
    max_steps: 10
    success_threshold: 0.70
  - id: n_plus_one_to_join
    difficulty: medium
    description: "Convert N+1 correlated subquery in SELECT to JOIN+GROUP BY or CTE"
    max_steps: 10
    success_threshold: 0.70
  - id: window_function_rewrite
    difficulty: hard
    description: "Replace O(N2) nested correlated subqueries with window functions and CTEs"
    max_steps: 10
    success_threshold: 0.70
observation_space:
  type: object
  fields:
    task_id: {type: string}
    difficulty: {type: string}
    original_query: {type: string}
    current_query: {type: string}
    step_number: {type: integer}
    max_steps: {type: integer}
    syntax_valid: {type: boolean}
    issues_found: {type: array}
    hints: {type: array}
    last_reward: {type: float}
    cumulative_reward: {type: float}
action_space:
  type: object
  fields:
    query:
      type: string
      required: true
    explanation:
      type: string
      required: false
reward:
  range: [-0.05, 1.0]
  shaped: true
  dense: true
endpoints:
  health: "GET /health"
  tasks: "GET /tasks"
  reset: "POST /reset"
  step: "POST /step"
  state: "GET /state"